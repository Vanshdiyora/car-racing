# ============================================================
# Custom Track Definitions
# ============================================================
# Each track has:
#   name:        Display name
#   waypoints:   List of [x, y] control points (closed loop, auto-connected)
#   width_scale: Road width multiplier (1.0 = normal, 1.5 = wide, 0.7 = narrow)
#   interpolation_steps: Smoothness between points (higher = smoother, default 8)
#
# Coordinate system:
#   - Centre roughly at (0, 0)
#   - Typical range: -150 to +150
#   - TRACK_WIDTH at scale 1.0 ≈ 6.7 units
#
# Tips:
#   - Minimum 4 waypoints
#   - Points are connected in order, last → first auto-closes
#   - Use the track editor: python -m src.tools.track_editor
# ============================================================

tracks:

  # ---- Oval (beginner) ----
  oval:
    name: "Oval Speedway"
    width_scale: 1.3
    interpolation_steps: 12
    waypoints:
      - [100, 0]
      - [80, 60]
      - [40, 90]
      - [0, 100]
      - [-40, 90]
      - [-80, 60]
      - [-100, 0]
      - [-80, -60]
      - [-40, -90]
      - [0, -100]
      - [40, -90]
      - [80, -60]

  # ---- Figure-8 (intermediate) ----
  figure8:
    name: "Figure 8"
    width_scale: 1.0
    interpolation_steps: 10
    waypoints:
      - [80, 0]
      - [60, 40]
      - [20, 60]
      - [-20, 40]
      - [-50, 10]
      - [-20, -40]
      - [20, -60]
      - [60, -40]
      - [80, 0]
      - [60, 40]
      - [20, 30]
      - [-30, -10]
      - [-60, -40]
      - [-80, -70]
      - [-90, -40]
      - [-60, 0]
      - [-40, 30]
      - [-10, 10]

  # ---- Monaco (tight hairpins) ----
  monaco:
    name: "Monaco GP"
    width_scale: 0.8
    interpolation_steps: 8
    waypoints:
      - [0, 0]
      - [40, 5]
      - [80, 0]
      - [100, -20]
      - [90, -50]
      - [60, -60]
      - [40, -40]
      - [50, -20]
      - [70, -10]
      - [80, -30]
      - [60, -80]
      - [20, -100]
      - [-20, -90]
      - [-40, -60]
      - [-20, -30]
      - [-50, -10]
      - [-80, -30]
      - [-100, -60]
      - [-90, -90]
      - [-60, -100]
      - [-30, -80]
      - [-40, -50]
      - [-60, -30]
      - [-40, 10]
      - [-20, 30]
      - [0, 20]

  # ---- Monza (long straights + chicanes) ----
  monza:
    name: "Monza Speedway"
    width_scale: 1.2
    interpolation_steps: 10
    waypoints:
      - [0, 0]
      - [30, 5]
      - [60, 0]
      - [90, -5]
      - [120, 0]
      - [130, 20]
      - [120, 40]
      - [100, 35]
      - [80, 40]
      - [60, 50]
      - [30, 45]
      - [0, 50]
      - [-30, 55]
      - [-60, 50]
      - [-80, 30]
      - [-100, 10]
      - [-110, -20]
      - [-90, -40]
      - [-60, -35]
      - [-30, -20]

  # ---- Nurburgring (complex, many turns) ----
  nurburgring:
    name: "Nurburgring"
    width_scale: 0.9
    interpolation_steps: 8
    waypoints:
      - [0, 0]
      - [20, 15]
      - [50, 20]
      - [70, 10]
      - [90, -10]
      - [100, -35]
      - [80, -55]
      - [50, -50]
      - [30, -65]
      - [10, -80]
      - [-20, -75]
      - [-40, -55]
      - [-55, -30]
      - [-70, -10]
      - [-85, 15]
      - [-95, 40]
      - [-80, 60]
      - [-55, 55]
      - [-30, 40]
      - [-10, 20]
