# Human vs AI race configuration
race:
  mode: "human_vs_ai"           # "human_vs_ai", "ai_only", "human_only"
  ai_model_path: "models/ppo_best/best_model.zip"
  n_laps: 3
  max_time_seconds: 300
  fps: 60

display:
  window_width: 1200
  window_height: 600
  split_screen: true            # side-by-side view
  show_hud: true                # speed, lap, timer overlay
  show_minimap: false

controls:
  # Keyboard mapping for human player
  accelerate: "UP"
  brake: "DOWN"
  steer_left: "LEFT"
  steer_right: "RIGHT"

scoring:
  track_completion_weight: 1.0
  time_weight: 0.5
  penalty_weight: 0.3
