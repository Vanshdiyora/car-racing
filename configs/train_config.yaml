# Training configuration for PPO agent
training:
  algorithm: "PPO"
  total_timesteps: 2_000_000
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  clip_range_vf: null
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  normalize_advantage: true
  seed: 42
  device: "auto"              # "auto", "cpu", "cuda"
  verbose: 1

checkpoints:
  save_dir: "models/ppo_baseline"
  save_freq: 50_000           # steps between checkpoints
  best_model_dir: "models/ppo_best"

logging:
  tensorboard_dir: "logs/tensorboard"
  csv_path: "logs/training_logs.csv"
  log_interval: 10            # episodes between console logs

evaluation:
  eval_freq: 20_000
  n_eval_episodes: 10
  deterministic: true
